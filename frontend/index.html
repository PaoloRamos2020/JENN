    <style>
      #veda-greeting {
        display: block;
        text-align: center;
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-weight: 400;
        font-size: clamp(0.65rem, 1.1vw, 0.85rem);
        letter-spacing: 0.45em;
        color: #c9b593;
        margin-bottom: 1.1rem;
        pointer-events: none;
        user-select: none;
      }
      #veda-greeting span {
        display: inline-block;
        opacity: 0;
        transform: translateY(9px);
        animation: veda-letter-rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      #veda-greeting-line {
        display: block;
        width: 28px;
        height: 1px;
        background: #c9b593;
        margin: 0 auto 1.1rem;
        opacity: 0;
        animation: veda-line-appear 1s ease forwards;
        pointer-events: none;
      }
      @keyframes veda-letter-rise {
        to { opacity: 0.82; transform: translateY(0); }
      }
      @keyframes veda-line-appear {
        to { opacity: 0.4; }
      }
      @keyframes veda-breathe {
        0%, 100% { opacity: 0.6; }
        50%       { opacity: 0.92; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var MSG   = 'Good Morning Sunshine!!!';
        var DELAY = 0.32;   /* seconds before first letter */
        var STEP  = 0.055;  /* seconds between letters     */
        var done  = false;

        function inject() {
          if (done) return;
          var anchor = document.querySelector('img[alt="VEDA"]');
          if (!anchor) return;
          done = true;

          /* thin gold rule */
          var line = document.createElement('span');
          line.id = 'veda-greeting-line';
          var lastLetterDelay = DELAY + (MSG.length - 1) * STEP;
          line.style.animationDelay = (lastLetterDelay + 0.5) + 's';
          anchor.parentNode.insertBefore(line, anchor);

          /* greeting text */
          var el = document.createElement('div');
          el.id = 'veda-greeting';
          el.setAttribute('aria-hidden', 'true');
          el.innerHTML = MSG.split('').map(function (ch, i) {
            var delay = DELAY + i * STEP;
            return '<span style="animation-delay:' + delay + 's">'
                   + (ch === ' ' ? '&nbsp;' : ch)
                   + '</span>';
          }).join('');
          anchor.parentNode.insertBefore(el, line);

          /* after reveal → gentle breathe */
          var breatheStart = lastLetterDelay + 1.2;
          setTimeout(function () {
            el.querySelectorAll('span').forEach(function (s) {
              s.style.animation = 'veda-breathe 4s ease-in-out infinite';
              s.style.opacity   = '0.82';
            });
          }, breatheStart * 1000);
        }

        var obs = new MutationObserver(inject);
        obs.observe(document.documentElement, { childList: true, subtree: true });
        setTimeout(function () { obs.disconnect(); }, 10000);
        document.addEventListener('DOMContentLoaded', inject);
      })();
    </script>
  </body>
