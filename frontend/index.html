    <style>
      #veda-bounce {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        font-family: 'Pacifico', cursive;
        font-size: clamp(2.8rem, 5.5vw, 5rem);
        white-space: nowrap;
        pointer-events: none;
        user-select: none;
        will-change: transform;
        text-shadow:
          0 2px 12px rgba(0,0,0,0.25),
          0 0  30px rgba(0,0,0,0.12);
        transition: color 0.4s ease;
      }
    </style>

  <body>
    <div id="root"></div>
    <script>
      (function () {
        var TEXT   = 'Good Morning Sunshine!!!';
        var SPEED  = 2.2;        /* px per frame            */
        var RPF    = 1.4;        /* degrees rotation/frame  */
        var COLORS = ['#c9b593','#7a8b6e','#f5f1eb','#c9b593','#d4a96a','#8fa67e'];
        var ci     = 0;

        var el = document.createElement('div');
        el.id  = 'veda-bounce';
        el.setAttribute('aria-hidden', 'true');
        el.textContent = TEXT;
        document.body.appendChild(el);
        el.style.color = COLORS[ci];

        /* wait one frame so the browser knows the element's size */
        requestAnimationFrame(function () {
          var W  = el.offsetWidth  || 500;
          var H  = el.offsetHeight || 80;

          /* start roughly centred */
          var x  = (window.innerWidth  - W) / 2;
          var y  = (window.innerHeight - H) / 2;

          /* random launch angle, avoid near-horizontal/vertical */
          var ang = (Math.random() * 60 + 25) * (Math.PI / 180);
          var dx  = Math.cos(ang) * SPEED * (Math.random() < 0.5 ? 1 : -1);
          var dy  = Math.sin(ang) * SPEED * (Math.random() < 0.5 ? 1 : -1);
          var rot = 0;

          function bounce() {
            var vw = window.innerWidth;
            var vh = window.innerHeight;

            x += dx;
            y += dy;

            var hit = false;
            if (x <= 0)        { x = 0;      dx =  Math.abs(dx); hit = true; }
            if (x + W >= vw)   { x = vw - W; dx = -Math.abs(dx); hit = true; }
            if (y <= 0)        { y = 0;      dy =  Math.abs(dy); hit = true; }
            if (y + H >= vh)   { y = vh - H; dy = -Math.abs(dy); hit = true; }

            /* colour swap + quick pop on wall hit */
            if (hit) {
              ci = (ci + 1) % COLORS.length;
              el.style.color = COLORS[ci];
              el.style.textShadow =
                '0 0 40px ' + COLORS[ci] + ', 0 2px 12px rgba(0,0,0,0.3)';
              setTimeout(function () {
                el.style.textShadow =
                  '0 2px 12px rgba(0,0,0,0.25), 0 0 30px rgba(0,0,0,0.12)';
              }, 300);
            }

            rot += RPF;
            el.style.transform =
              'translate(' + x + 'px,' + y + 'px) rotate(' + rot + 'deg)';

            requestAnimationFrame(bounce);
          }

          /* recalculate W/H on resize */
          window.addEventListener('resize', function () {
            W = el.offsetWidth  || W;
            H = el.offsetHeight || H;
          });

          bounce();
        });
      })();
    </script>
