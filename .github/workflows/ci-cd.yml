name: CI/CD — JENN Landing Page

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente a desplegar'
        required: true
        type: choice
        options: [dev, qa, prod]
        default: prod
      apply_infra:
        description: 'Aplicar cambios de Terraform'
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1: Resolver ambiente
  # ──────────────────────────────────────────────────────────────
  set-environment:
    name: Set Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      s3_bucket:   ${{ steps.env.outputs.s3_bucket }}
      apply_infra: ${{ steps.env.outputs.apply_infra }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.environment }}"
            APPLY_INFRA="${{ inputs.apply_infra }}"
          else
            ENV="prod"
            APPLY_INFRA="false"
          fi

          echo "environment=$ENV"                                   >> $GITHUB_OUTPUT
          echo "s3_bucket=jenn-$ENV-${{ secrets.AWS_ACCOUNT_ID }}" >> $GITHUB_OUTPUT
          echo "apply_infra=$APPLY_INFRA"                           >> $GITHUB_OUTPUT

          echo "──────────────────────────────────────────"
          echo "  Ambiente : $ENV"
          echo "  Infra    : $APPLY_INFRA"
          echo "──────────────────────────────────────────"

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Terraform (opcional)
  # ──────────────────────────────────────────────────────────────
  terraform:
    name: Terraform (${{ needs.set-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: set-environment
    if: needs.set-environment.outputs.apply_infra == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_environment: ${{ needs.set-environment.outputs.environment }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_environment: ${{ needs.set-environment.outputs.environment }}
        run: terraform apply -auto-approve tfplan

  # ──────────────────────────────────────────────────────────────
  # JOB 3: Deploy Frontend a S3 + invalidar CloudFront
  # ──────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (${{ needs.set-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [set-environment, terraform]
    if: always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/ \
            s3://${{ needs.set-environment.outputs.s3_bucket }} \
            --delete \
            --cache-control "max-age=86400"
          echo "✅ Frontend desplegado en s3://${{ needs.set-environment.outputs.s3_bucket }}"

      - name: Invalidate CloudFront
        run: |
          CF_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='JENN ${{ needs.set-environment.outputs.environment }}'].Id" \
            --output text)
          if [[ -z "$CF_ID" || "$CF_ID" == "None" ]]; then
            echo "⚠️  No se encontró distribución CloudFront — se omite invalidación"
            exit 0
          fi
          aws cloudfront create-invalidation \
            --distribution-id $CF_ID --paths "/*"
          echo "✅ Cache invalidado en CloudFront: $CF_ID"
