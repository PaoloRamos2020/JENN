name: CI/CD — JENN Landing Page

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente a desplegar'
        required: true
        type: choice
        options: [dev, qa, prod]
        default: dev

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1: Resolver ambiente
  # ──────────────────────────────────────────────────────────────
  set-environment:
    name: Set Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      s3_bucket:   ${{ steps.env.outputs.s3_bucket }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.environment }}"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            ENV="prod"
          else
            ENV="dev"
          fi

          echo "environment=$ENV"                        >> $GITHUB_OUTPUT
          echo "s3_bucket=jenn-$ENV-${{ secrets.AWS_ACCOUNT_ID }}" >> $GITHUB_OUTPUT

          echo "──────────────────────────────────────────"
          echo "  Ambiente : $ENV"
          echo "──────────────────────────────────────────"

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Deploy Frontend a S3 + invalidar CloudFront
  # ──────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (${{ needs.set-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: set-environment
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/ \
            s3://${{ needs.set-environment.outputs.s3_bucket }} \
            --delete \
            --cache-control "max-age=86400"
          echo "✅ Frontend desplegado en s3://${{ needs.set-environment.outputs.s3_bucket }}"

      - name: Invalidate CloudFront
        run: |
          CF_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='JENN ${{ needs.set-environment.outputs.environment }}'].Id" \
            --output text)
          if [[ -z "$CF_ID" || "$CF_ID" == "None" ]]; then
            echo "⚠️  No se encontró distribución CloudFront — se omite invalidación"
            exit 0
          fi
          aws cloudfront create-invalidation \
            --distribution-id $CF_ID --paths "/*"
          echo "✅ Cache invalidado en CloudFront: $CF_ID"
